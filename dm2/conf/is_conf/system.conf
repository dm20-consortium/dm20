############ GENERAL SETTINGS ############
# @TCP_TIMEOUT_SEC:ISへの接続確立後、無操作だった場合のタイムアウト時間(秒)
# @TCP_TIMEOUT_SEC:長期稼働させたい場合は0（無期限）をセットすること
TCP_TIMEOUT_SEC=0

# @UDP_SOCK_TIMEOUT_SEC:UDPソケットのタイムアウト時間(秒)
UDP_SOCK_TIMEOUT_SEC=1

# @DTLS_SOCK_TIMEOUT_SEC:DTLSソケットのタイムアウト時間(秒)
DTLS_SOCK_TIMEOUT_SEC=1

# @DTLS_SOCK_TIMEOUT_CNT:DTLSソケットタイムアウトの許容回数。許容回数に達するとDTLSの接続をcloseする
DTLS_SOCK_TIMEOUT_CNT=3600

# @STREAM_RECEIVE_WORKER_NUM:ストリーム受信スレッド数
STREAM_RECEIVE_WORKER_NUM=10

# @CS_RECEIVE_WORKER_NUM:CS受信スレッド数
CS_RECEIVE_WORKER_NUM=10


############ ENCRYPTION SETTINGS ############
# @IS_ENABLE_SSL:SSL通信の有効(1),無効(0)を指定する
IS_ENABLE_SSL=0

# @SSL_CERTIFICATE_FILE_ABS_PATH:サーバ証明書ファイルの絶対パス指定(ファイルに読取権限、ディレクトリに実行権限必要)
SSL_CERTIFICATE_FILE_ABS_PATH=/etc/ssl/dm2/cacert.pem

# @SSL_PRIVATE_KEY_FILE_ABS_PATH:プライベートキーファイルの絶対パス指定(ファイルに読取権限、ディレクトリに実行権限必要)
SSL_PRIVATE_KEY_FILE_ABS_PATH=/etc/ssl/dm2/private/cakey.pem

# @SSL_PEM_PASS_PHRASE:証明書のパスフレーズ
SSL_PEM_PASS_PHRASE=test_pem_pass

############ QUEUE SETTINGS ############
# @QUEUE_DELETE_INTERVAL_SEC:古いキューを削除する間隔(秒)
QUEUE_DELETE_INTERVAL_SEC=1

# @QUEUE_DELETE_DEFAULT_RANGE_SEC:削除対象のキューを判定するための範囲(秒)
QUEUE_DELETE_DEFAULT_RANGE_SEC=10

# @QUEUE_DELETE_DEFAULT_RANGE_NUM:削除対象のキューを判定するための範囲(個数)
QUEUE_DELETE_DEFAULT_RANGE_NUM=10

############ QUEUE WORKER SETTINGS ############
# @QUEUE_RECEIVE_WORKER_DEFAULT_NUM:Queue受信処理のデフォルトスレッド数
QUEUE_RECEIVE_WORKER_DEFAULT_NUM=1

# @QUEUE_RECEIVE_WORKER_NUM_dynamic_map_info:dynamic_map_infoストリームのQueue受信処理スレッド数
QUEUE_RECEIVE_WORKER_NUM_dynamic_map_info=10

# @QUEUE_RECEIVE_WORKER_NUM_vehicle_position:vehicle_positionストリームのQueue受信処理スレッド数
QUEUE_RECEIVE_WORKER_NUM_vehicle_position=10


############ DATA OPERATING SETTINGS ############
# @SID_TYPE:SIDの種別を指定する。0:車両、1:エッジ、2:クラウド
SID_TYPE=0
# @CLOUD_STATION_ID: ALLが指定された時に転送するクラウドのSID（ALLのクエリ例：FROM stream [RANGE 100msec, all]）
CLOUD_STATION_ID=0
#----------- STREAM DATA CORRECTION -----------#
# @ADD_SID_SCHEMA:SIDを付与するストリーム名.カラム名を指定する（車両ISのみ有効でカンマ区切りで複数指定可）
# @ADD_SID_SCHEMA:【候補】dynamic_map_info.id,scheduled_local_path_plan.vehicle_id,scheduled_global_path_plan.vehicle_id
ADD_SID_SCHEMA= object_info_0_8_1.object_id

# @ADD_LANE_ID_SCHEMA:レーンIDを扱うストリーム名.カラム名を指定する（車両ISのみ有効でカンマ区切りで複数指定可）
# @ADD_LANE_ID_SCHEMA:主にCSに伝達するレーンID情報を取得、またはレーンID補完時に用いる
# @ADD_LANE_ID_SCHEMA:【候補】dynamic_map_info.lane_id,mobile_users_plus.lane_id,object_info.lane_id
ADD_LANE_ID_SCHEMA=

# @ADD_LANE_SEARCH_PRIORITY_PLAN_VID:レーンを抽出する際に優先的に参照する経路計画ストリームおよび車両IDとなるカラム名を指定
# @ADD_LANE_SEARCH_PRIORITY_PLAN_VID:【候補】scheduled_global_path_plan.vehicle_id
ADD_LANE_SEARCH_PRIORITY_PLAN_VID=

# @ADD_LANE_SEARCH_PRIORITY_PLAN_LANE:レーンを抽出する際に優先的に参照する経路計画ストリームおよびレーンIDリストとなるカラム名を指定
# @ADD_LANE_SEARCH_PRIORITY_PLAN_LANE:【候補】scheduled_global_path_plan.lane_id_list
ADD_LANE_SEARCH_PRIORITY_PLAN_LANE=

# @POSSET_object_info:ADD_LANE_ID_SCHEMAに指定したスキーマ内で、どのカラム>がX,Y,Zの座標を表しているかを指定
# @POSSET_object_info:ADD_LANE_ID_SCHEMAに指定した場合かつ本パラメータを設>定する事でレーンIDを補完する
POSSET_object_info=longitude,latitude,altitude
# @POSSET_dynamic_map_info:ADD_LANE_ID_SCHEMAに指定したスキーマ内で、どのカラムがX,Y,Zの座標を表しているかを指定
# @POSSET_dynamic_map_info:ADD_LANE_ID_SCHEMAに指定した場合かつ本パラメータを設定する事でレーンIDを補完する
POSSET_dynamic_map_info=x,y,z

# @POSSET_mobile_users_plus:ADD_LANE_ID_SCHEMAに指定したスキーマ内で、どのカラムがX,Y,Zの座標を表しているかを指定
# @POSSET_mobile_users_plus:ADD_LANE_ID_SCHEMAに指定した場合かつ本パラメータを設定する事でレーンIDを補完する
POSSET_mobile_users_plus=pos_x,pos_y

# @POSSET_vehicle_position:ADD_LANE_ID_SCHEMAに指定した場合、どのカラムがX,Y,Zの座標を表しているかを指定
#POSSET_vehicle_position=pos_x,pos_y,pos_z

#----------- LANE ESTIMATION SETTINGS -----------#
# @ADD_LANE_SEARCH_LIMIT:座標点に近い候補レーンを検索する際の候補上限数
ADD_LANE_SEARCH_LIMIT=4

# @ADD_LANE_SEARCH_PRIORITY_SENSOR:候補レーンから抽出する際に優先的に参照するセンサを指定(GPS or IMU or LIDAR)
ADD_LANE_SEARCH_PRIORITY_SENSOR=LIDAR

#ADD_LANE_SEARCH_PRIORITY_PLAN_VID,LANE指定時に必要となるパラメータ（ストリーム別）
VIDSET_object_info=id
VIDSET_dynamic_map_info=id

# @ADD_LANE_SEARCH_YAW_THRESHOLD:候補レーンから抽出するヨー角(±度)の閾値
# @ADD_LANE_SEARCH_YAW_THRESHOLD:0指定でヨー角による抽出処理を実施しない
ADD_LANE_SEARCH_YAW_THRESHOLD=90

# @ADD_LANE_SEARCH_DIST_THRESHOLD:候補レーンから抽出する距離(m)の閾値
ADD_LANE_SEARCH_DIST_THRESHOLD=10

#----------- DB SETTINGS -----------#
# @QUERY_SCHEME_NAME:接続したDBでスキーマを設定している場合に指定
QUERY_SCHEME_NAME=dm2

# @NOT_USED_CACHE_TABLE:キャッシュ化しないテーブル名を指定(カンマ区切りで複数指定可)
NOT_USED_CACHE_TABLE=parking_space_info

#----------- LOCATION SETTINGS -----------#
# @MONITORING_OUT_OF_AREA_INTERVAL_TIME:LocationManagerでエリア外判定する際のチェック間隔(msec)
# @MONITORING_OUT_OF_AREA_INTERVAL_TIME:2000を指定した場合は2秒毎にエリア外に出たかを判定する(Cloud,Edgeに有効な設定)
MONITORING_OUT_OF_AREA_INTERVAL_TIME=2000

# @PLANE_NUMBER_SRID:動作させる地域に従って平面直角座標系のIDを指定
# @PLANE_NUMBER_SRID:7系(石川県、富山県、岐阜県、愛知県)：JGD2000の場合2449,JGD2011の場合6675
# @PLANE_NUMBER_SRID:9系(東京都の一部、福島県、栃木県、茨城県、埼玉県、千葉県、群馬県、神奈川県)：JGD2000の場合2451,JGD2011の場合6677
PLANE_NUMBER_SRID=4326

# @HISTORY_RECORD_CLASS:DBへ記録するクラス名を指定(カンマ区切りで複数指定可)
# @HISTORY_RECORD_CLASS:対象CreateOperator,DropOperator,EvalOperator
# @HISTORY_RECORD_CLASS:,ProjectionOperator,QueryManager,QueryReceiver
# @HISTORY_RECORD_CLASS:,ResponseOperator,WindowOperator,TransferOperator
# @HISTORY_RECORD_CLASS:,RequestOperator,SelectionOperator,JoinOperator
# @HISTORY_RECORD_CLASS:,RDBAccessOperator,RecursiveOperator,UnionOperator
# @HISTORY_RECORD_CLASS:,RenameColumnOperator,RenameTableOperator
#HISTORY_RECORD_CLASS=CreateOperator,DropOperator,EvalOperator,ProjectionOperator,QueryManager,QueryReceiver,ResponseOperator,WindowOperator,TransferOperator,RequestOperator,SelectionOperator,JoinOperator,RDBAccessOperator,RecursiveOperator,RenameColumnOperator,RenameTableOperator,UnionOperator
HISTORY_RECORD_CLASS=

# @HISTORY_RECORD_INTERVAL:DBへ記録する周期(sec) 
# @HISTORY_RECORD_INTERVAL:オペレータ計測用につき、OPERATOR_HISTORYテーブルにのみ有効
# @HISTORY_RECORD_INTERVAL:0を指定した場合は、周期的には記録しない。
# @HISTORY_RECORD_INTERVAL:各種Operatorが終了する際にのみ記録される。
HISTORY_RECORD_INTERVAL=3600

# @HISTORY_RECORD_HM:DBへ記録する時刻(HH:MM)
# @HISTORY_RECORD_HM:オペレータ計測用につき、OPERATOR_HISTORYテーブルにのみ有効
# @HISTORY_RECORD_HM:空の場合は、記録しない。
# @HISTORY_RECORD_HM:内部時刻で確認するため、dateコマンドでJSTかUTCかを要確認
HISTORY_RECORD_HHMM=

# @COMPRESS_FLG:データ連携時に圧縮をするか判定するフラグ（2:圧縮する(zStandard) 1:圧縮する(zlib), 0:圧縮しない)
COMPRESS_FLG=0

# @TIMER_MODE:CREATE TIMER時、どの方式を採用するか決めるフラグ (0:スレッド方式、1:スリープ方式)
TIMER_MODE=0