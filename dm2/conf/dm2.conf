# 重複受信データ管理のレコード保持時間、及びデータ削除処理実行間隔(秒)
DUAL_MAP_CLEAR_TIME = 100
# sendto実行エラー発生時のsendtoリトライ回数
MAX_SENDTO_TIMES = 10
# 複数通信時の重複チェックフラグ(1:重複除去する、1以外:除去しない)
CS_DUPLICATE_CHECK = 1
# トレースログのON/OFF(OFF:0, ON:1)
TRACE_ON = 0
