syntax = "proto3";

package cool4_api_0_6_0;

message Object_info {
	// API 仕様案に基づく属性
	optional fixed64 id = 1;
	optional uint64 time = 2;
	optional uint32 object_class_id_0 = 6;
	optional uint32 object_class_confidence_0 = 7;
	optional uint32 object_class_subclass_type_0 = 8;
	optional uint32 object_class_subclass_confidence_0 = 9;
	optional uint32 object_class_id_1 = 10;
	optional uint32 object_class_confidence_1 = 11;
	optional uint32 object_class_subclass_type_1 = 12;
	optional uint32 object_class_subclass_confidence_1 = 13;
	optional uint32 object_class_id_2 = 14;
	optional uint32 object_class_confidence_2 = 15;
	optional uint32 object_class_subclass_type_2 = 16;
	optional uint32 object_class_subclass_confidence_2 = 17;
	optional uint32 object_class_id_3 = 18;
	optional uint32 object_class_confidence_3 = 19;
	optional uint32 object_class_subclass_type_3 = 20;
	optional uint32 object_class_subclass_confidence_3 = 21;
	optional uint32 existency = 22;
	optional Position_and_movement position_and_movement = 4;
	optional Vehicle_condition vehicle_condition = 5;
	repeated uint64 information_source_list = 3;
}

//Position_and_movement(位置と移動)
message Position_and_movement {
	optional uint32 geodetic_system = 1;
	optional sint32 latitude = 2;
	optional sint32 longitude = 3;
	optional sint32 altitude = 4;
	optional uint32 crp_id = 5;
	optional sint32 dx_crp = 6;
	optional sint32 dy_crp = 7;
	optional sint32 dh_crp = 8;
	optional uint32 lane_count = 9;
	optional sint32 lane_position = 10;
	optional uint32 lane_lateral_position = 11;
	optional uint32 crp_id_begin = 12;
	optional uint32 crp_id_end = 13;
	optional uint32 lane_vertical_position = 14;
	optional uint64 lane_id = 15;
	optional sint32 dx_lane = 16;
	optional sint32 dy_lane = 17;
	optional sint32 dh_lane = 18;
	optional uint32 semi_axis_length_major = 19;
	optional uint32 semi_axis_length_minor = 20;
	optional uint32 ellipse_orientation = 21;
	optional uint32 altitude_accuracy = 22;
	optional uint32 reference_point = 23;
	optional uint32 move_direction_value = 24;
	optional uint32 move_direction_accuracy = 25;
	optional sint32 speed_value = 26;
	optional uint32 speed_accuracy = 27;
	optional sint32 yaw_rate_value = 28;
	optional uint32 yaw_rate_accuracy = 29;
	optional sint32 acceleration_value = 30;
	optional uint32 acceleration_accuracy = 31;
}

//Vehicle_condition(車両の状態)
message Vehicle_condition {
	optional uint32 orientation_value = 1;
	optional uint32 orientation_accuracy = 2;
	optional uint32 length_value = 3;
	optional uint32 length_accuracy = 4;
	optional uint32 width_value = 5;
	optional uint32 width_accuracy = 6;
	optional uint32 height_value = 7;
	optional uint32 height_accuracy = 8;
	optional uint32 color = 9;
	optional uint32 shift_position = 10;
	optional sint32 steering_angle_front = 11;
	optional sint32 steering_angle_rear = 12;
	optional uint32 brake_state = 13;
	optional uint32 auxiliary_brake_state = 14;
	optional uint32 throttle_position = 15;
	optional uint32 exterior_lights = 16;
	optional uint32 adaptive_cruise_control_system = 17;
	optional uint32 cooperative_adaptive_cruise_control_system = 18;
	optional uint32 pre_crash_safety_system = 19;
	optional uint32 antilock_brake_system = 20;
	optional uint32 traction_control_system = 21;
	optional uint32 electronic_stability_control_system = 22;
	optional uint32 lane_keeping_assist_system = 23;
	optional uint32 lane_departure_warning_system = 24;
	optional uint32 vehicle_role = 25;
	optional uint32 vehicle_extended_info = 26;
	optional uint64 towing_vehicle = 27;
}
